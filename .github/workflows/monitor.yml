name: London Breakout Monitor
on:
  workflow_dispatch:
  schedule:
    - cron: '15 8 * * 1-5'
jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Dependencies
        run: pip install yfinance pandas
      - name: Run Analysis
        run: python monitor.py

